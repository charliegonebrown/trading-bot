services:
  - type: web
    name: trading-bot-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-bot-db
          property: connectionString
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_SECRET_KEY
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: trading-bot-db
    databaseName: trading_bot
    user: trading_user
    plan: free
